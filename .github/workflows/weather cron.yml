name: Weather Pipeline

on:
  schedule:
    # DB1 short run (days 0-5, 0.5°): every 6 hours
    - cron: "0 5,11,17,23 * * *"
    # DB2 long run (days 5-16, 1°): every 12 hours
    - cron: "30 5,17 * * *"

  workflow_dispatch:
    inputs:
      job:
        description: "Which pipeline to run"
        required: true
        default: "short"
        type: choice
        options:
          - short
          - long
          - both

jobs:

  # ── DB1: Days 0-5, 0.5° resolution ─────────────────────────────────────────
  etl-short:
    name: "DB1 Short (days 0-5)"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' && (
        github.event.schedule == '0 5,11,17,23 * * *'
      ) || (
        github.event_name == 'workflow_dispatch' && (
          github.event.inputs.job == 'short' || github.event.inputs.job == 'both'
        )
      )

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install eccodes
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libeccodes-dev libeccodes-tools

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r weather-pipeline/requirements.txt

      - name: Storage safety check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'EOF'
          import os, sys
          from supabase import create_client
          sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          try:
              result = sb.rpc("get_weather_grid_size_mb", {}).execute()
              size_mb = float(result.data or 0)
              print(f"DB1 size: {size_mb:.0f}MB")
              if size_mb >= 490:
                  print(f"::error::DB1 size {size_mb:.0f}MB >= 490MB — aborting")
                  print("Run TRUNCATE TABLE weather_grid; REINDEX TABLE weather_grid; in Supabase SQL Editor")
                  sys.exit(1)
              elif size_mb >= 460:
                  print(f"Warning: DB1 size {size_mb:.0f}MB is high but proceeding (TRUNCATE will run first)")
          except Exception as e:
              print(f"Size check unavailable ({e}) — proceeding")
          EOF

      - name: Run DB1 ETL (short)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd weather-pipeline
          python etl.py --mode short

      - name: Report failure
        if: failure()
        run: echo "::error::DB1 short ETL failed"

  # ── DB2: Days 5-16, 1° resolution ──────────────────────────────────────────
  etl-long:
    name: "DB2 Long (days 5-16)"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      github.event_name == 'schedule' && (
        github.event.schedule == '30 5,17 * * *'
      ) || (
        github.event_name == 'workflow_dispatch' && (
          github.event.inputs.job == 'long' || github.event.inputs.job == 'both'
        )
      )

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install eccodes
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libeccodes-dev libeccodes-tools

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r weather-pipeline/requirements.txt

      - name: Storage safety check
        env:
          SUPABASE_URL_LONG: ${{ secrets.SUPABASE_URL_LONG }}
          SUPABASE_SERVICE_KEY_LONG: ${{ secrets.SUPABASE_SERVICE_KEY_LONG }}
        run: |
          python3 - << 'EOF'
          import os, sys
          from supabase import create_client
          sb = create_client(os.environ["SUPABASE_URL_LONG"], os.environ["SUPABASE_SERVICE_KEY_LONG"])
          try:
              result = sb.rpc("get_weather_grid_size_mb", {}).execute()
              size_mb = float(result.data or 0)
              print(f"DB2 size: {size_mb:.0f}MB")
              if size_mb >= 490:
                  print(f"::error::DB2 size {size_mb:.0f}MB >= 490MB — aborting")
                  sys.exit(1)
          except Exception as e:
              print(f"Size check unavailable ({e}) — proceeding")
          EOF

      - name: Run DB2 ETL (long)
        env:
          SUPABASE_URL_LONG: ${{ secrets.SUPABASE_URL_LONG }}
          SUPABASE_SERVICE_KEY_LONG: ${{ secrets.SUPABASE_SERVICE_KEY_LONG }}
        run: |
          cd weather-pipeline
          python etl_long.py

      - name: Report failure
        if: failure()
        run: echo "::error::DB2 long ETL failed"
